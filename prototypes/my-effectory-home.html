<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Effectory — Home</title>
  <!-- resolve assets from the repo root — works locally (/) and on GitHub Pages (/repo-name/) -->
  <script>document.write('<base href="' + location.pathname.replace(/prototypes\/.*$/, '') + '">');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="foundation.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body { margin: 0; font-family: 'Poppins', sans-serif; color: var(--content-base); background: var(--bg-secondary); -webkit-font-smoothing: antialiased; }

    /* App layout: nav left (full height), content right */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .app .mainnav { height: 100%; border: 0; border-right: 1px solid var(--border-base); border-radius: 0; overflow-y: auto; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

    .topbar { display: flex; align-items: center; gap: var(--spacing-base-tight); height: 64px; padding: 0 var(--spacing-extra-loose); border-bottom: 1px solid var(--border-base); background: var(--bg-base); flex-shrink: 0; }
    .topbar .crumb { font-size: 12px; color: var(--content-subtle); }
    .topbar .crumb b { color: var(--content-secondary); font-weight: 500; }
    .topbar .spacer { flex: 1; }
    .topbar .tb-btn { width: 36px; height: 36px; border-radius: var(--radius-full); border: 1px solid var(--border-base); background: var(--bg-base); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--content-action); position: relative; }
    .topbar .tb-btn i[data-icon] { width: 16px; height: 16px; display: flex; }
    .topbar .tb-btn .dot { position: absolute; top: 6px; right: 7px; width: 7px; height: 7px; border-radius: var(--radius-full); background: var(--bg-negative-base); border: 1.5px solid var(--bg-base); }

    .content { flex: 1; overflow-y: auto; padding: var(--spacing-extra-loose) var(--spacing-extra-loose) var(--spacing-super-extra-loose); }
    .content-inner { max-width: 1040px; margin: 0 auto; }

    /* ── Greeting hero ── */
    .hero { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--spacing-loose); margin-bottom: var(--spacing-extra-loose); }
    .hero h1 { font-size: 32px; font-weight: 600; letter-spacing: -.5px; margin: 0 0 6px; }
    .hero .hero-sub { font-size: 14px; color: var(--content-secondary); margin: 0; line-height: 1.5; }
    .hero .hero-date { font-size: 12px; color: var(--content-subtle); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; margin: 0 0 10px; }

    .section-head { display: flex; align-items: center; gap: var(--spacing-tight); margin: var(--spacing-extra-loose) 0 var(--spacing-base); }
    .section-head h2 { font-size: 20px; font-weight: 600; letter-spacing: -.2px; margin: 0; }
    .section-head .count { font-size: 12px; font-weight: 600; color: var(--content-on-brand-base); background: var(--bg-brand-base); border-radius: var(--radius-full); min-width: 20px; height: 20px; padding: 0 6px; display: inline-flex; align-items: center; justify-content: center; }
    .section-head .spacer { flex: 1; }
    .section-head .see-all { font-size: 14px; }

    /* ── Activities: horizontal action cards ── */
    .activities { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: var(--spacing-base); }
    .act-card { text-align: left; background: var(--bg-base); border: 1px solid var(--border-base); border-radius: var(--radius-lg); box-shadow: var(--sh-card); padding: var(--spacing-loose); cursor: pointer; display: flex; flex-direction: column; gap: var(--spacing-base-tight); transition: box-shadow .15s, transform .15s, border-color .15s; font-family: inherit; }
    .act-card:hover { box-shadow: var(--sh-card-hover); transform: translateY(-2px); border-color: var(--border-action); }
    .act-top { display: flex; align-items: center; gap: var(--spacing-base-tight); }
    .act-ico { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .act-ico i[data-icon] { width: 20px; height: 20px; display: flex; }
    .act-ico.teal { background: var(--bg-brand-subtle); color: var(--content-brand-base); }
    .act-ico.purple { background: var(--bg-accent-purple-subtle); color: var(--content-accent-purple-base); }
    .act-ico.orange { background: var(--bg-warning-subtle); color: var(--content-warning-base); }
    .act-card h3 { font-size: 16px; font-weight: 600; margin: 0; line-height: 1.35; }
    .act-card .act-desc { font-size: 14px; color: var(--content-secondary); margin: 0; line-height: 1.5; }
    .act-meta { display: flex; align-items: center; gap: var(--spacing-tight); margin-top: auto; padding-top: var(--spacing-tight); }
    .deadline { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: var(--content-secondary); }
    .deadline i[data-icon] { width: 13px; height: 13px; display: flex; }
    .deadline.urgent { color: var(--content-negative-base); }

    /* progress bar for "complete profile" type */
    .progress { height: 6px; border-radius: var(--radius-full); background: var(--bg-tertiary); overflow: hidden; }
    .progress > span { display: block; height: 100%; border-radius: var(--radius-full); background: var(--bg-brand-base); }

    /* ── News + Updates two-column ── */
    .feed-cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: var(--spacing-loose); align-items: start; }
    @media (max-width: 900px) { .feed-cols { grid-template-columns: 1fr; } }

    .news-list { display: flex; flex-direction: column; gap: var(--spacing-base); }
    .news-card { text-align: left; display: flex; gap: var(--spacing-base); background: var(--bg-base); border: 1px solid var(--border-base); border-radius: var(--radius-lg); box-shadow: var(--sh-card); padding: var(--spacing-base); cursor: pointer; transition: box-shadow .15s, border-color .15s; font-family: inherit; }
    .news-card:hover { box-shadow: var(--sh-card-hover); border-color: var(--border-action); }
    .news-thumb { width: 96px; height: 96px; border-radius: var(--radius-md); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; }
    .news-thumb i[data-icon] { width: 28px; height: 28px; display: flex; }
    .news-body { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    .news-tag { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .news-body h3 { font-size: 16px; font-weight: 600; margin: 0; line-height: 1.35; }
    .news-body p { font-size: 14px; color: var(--content-secondary); margin: 0; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-date { font-size: 12px; color: var(--content-subtle); margin-top: 2px; }

    /* Updates side column */
    .updates-card { background: var(--bg-base); border: 1px solid var(--border-base); border-radius: var(--radius-lg); box-shadow: var(--sh-card); overflow: hidden; }
    .upd-item { display: flex; gap: var(--spacing-base-tight); padding: var(--spacing-base); cursor: pointer; border-bottom: 1px solid var(--border-base); transition: background .12s; text-align: left; width: 100%; font-family: inherit; background: none; border-left: 0; border-right: 0; border-top: 0; }
    .upd-item:last-child { border-bottom: 0; }
    .upd-item:hover { background: var(--bg-base-hover); }
    .upd-dot { width: 32px; height: 32px; border-radius: var(--radius-md); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-brand-subtle); color: var(--content-brand-base); }
    .upd-dot i[data-icon] { width: 16px; height: 16px; display: flex; }
    .upd-text { min-width: 0; }
    .upd-text h4 { font-size: 14px; font-weight: 600; margin: 0 0 2px; line-height: 1.4; }
    .upd-text p { font-size: 12px; color: var(--content-subtle); margin: 0; line-height: 1.5; }

    /* ── Overlay / scrim shared by dialog + side panel ── */
    .scrim { position: fixed; inset: 0; background: rgba(25,39,67,.45); z-index: 100; display: none; }
    .scrim.is-open { display: block; }
    /* dialog centered */
    .scrim.dlg { display: none; align-items: flex-start; justify-content: center; padding: 64px 24px; overflow-y: auto; }
    .scrim.dlg.is-open { display: flex; }
    /* side panel pinned right */
    .scrim.sp { justify-content: flex-end; }
    .scrim.sp.is-open { display: flex; }
    .scrim .sidepanel { height: 100vh; max-height: 100vh; border-radius: var(--radius-xl) 0 0 var(--radius-xl); }

    .dlg-news-meta { display: flex; align-items: center; gap: var(--spacing-tight); margin-bottom: var(--spacing-base-tight); font-size: 12px; color: var(--content-subtle); }
    .dialog-body p { font-size: 14px; line-height: 1.65; color: var(--content-secondary); margin: 0 0 var(--spacing-base-tight); }
    .dialog-body p:last-child { margin-bottom: 0; }

    /* side panel body content */
    .sp-survey-q { padding: var(--spacing-base) 0; border-bottom: 1px solid var(--border-base); }
    .sp-survey-q:last-child { border-bottom: 0; }
    .sp-survey-q .q-text { font-size: 14px; font-weight: 500; margin: 0 0 var(--spacing-base-tight); line-height: 1.5; }
    .scale { display: flex; gap: var(--spacing-tight); }
    .scale button { flex: 1; height: 40px; border-radius: var(--radius-md); border: 1px solid var(--border-action); background: var(--bg-base); font-family: inherit; font-size: 14px; font-weight: 500; color: var(--content-secondary); cursor: pointer; transition: all .12s; }
    .scale button:hover { border-color: var(--border-brand-base); color: var(--content-brand-base); }
    .scale button.is-sel { background: var(--bg-brand-base); border-color: var(--bg-brand-base); color: var(--content-on-brand-base); }
    .sp-progress-bar { display: flex; align-items: center; gap: var(--spacing-base-tight); margin-top: var(--spacing-tight); }
    .sp-progress-bar .progress { flex: 1; }
    .sp-progress-bar span { font-size: 12px; color: var(--content-subtle); font-weight: 500; white-space: nowrap; }
  </style>
</head>
<body>

<div class="app">
  <div class="mainnav" id="nav">
    <div class="mn-portal">
      <span class="mn-logo"></span>
      <button class="mn-portal-btn"><b>Coordinator</b><i data-icon="chevron-down" class="mn-chev"></i></button>
    </div>
    <nav class="mn-nav" aria-label="Main">
      <a class="mn-item is-active" aria-current="page"><i data-icon="home"></i> Home</a>
      <a class="mn-item"><i data-icon="clipboard"></i> Surveys <i data-icon="chevron-down" class="mn-chev"></i></a>
      <a class="mn-item"><i data-icon="refresh"></i> 360° Feedback</a>
      <a class="mn-item"><i data-icon="pie-chart"></i> Reports</a>
      <a class="mn-item"><i data-icon="globe"></i> Organization <i data-icon="chevron-down" class="mn-chev"></i></a>
    </nav>
    <div class="mn-foot">
      <a class="mn-item"><i data-icon="help"></i> Help &amp; learn</a>
      <div class="mn-foot-divider"></div>
      <div class="mn-user">
        <div class="av av-36 av-blue">JR</div>
        <div class="mn-meta">
          <div class="mn-name">Jamal van Rooi…</div>
          <div class="mn-org">Effectory B.V.</div>
        </div>
        <i data-icon="chevron-down"></i>
      </div>
    </div>
  </div>

  <div class="main">
    <header class="topbar">
      <div class="crumb">Coordinator / <b>Home</b></div>
      <div class="spacer"></div>
      <button class="tb-btn" title="Search"><i data-icon="search"></i></button>
      <button class="tb-btn" title="Notifications"><i data-icon="bell"></i><span class="dot"></span></button>
    </header>

    <div class="content">
      <div class="content-inner">

        <!-- Greeting hero -->
        <div class="hero">
          <div>
            <p class="hero-date">Monday · 8 June 2026</p>
            <h1>Good morning, Jamal 👋</h1>
            <p class="hero-sub">You have 3 activities waiting and 2 new updates since you were last here.</p>
          </div>
        </div>

        <!-- ACTIVITIES -->
        <div class="section-head">
          <h2>Your activities</h2>
          <span class="count">3</span>
          <div class="spacer"></div>
          <button class="btn btn-link see-all">View all</button>
        </div>
        <div class="activities" id="activities"></div>

        <!-- NEWS + UPDATES -->
        <div class="feed-cols">
          <div>
            <div class="section-head"><h2>News</h2></div>
            <div class="news-list" id="news"></div>
          </div>
          <div>
            <div class="section-head"><h2>Product updates</h2></div>
            <div class="updates-card" id="updates"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- ── Side panel overlay (Activities) ── -->
<div class="scrim sp" id="spScrim">
  <div class="sidepanel sidepanel-sm" role="dialog" aria-modal="true" aria-labelledby="sp-title">
    <div class="sp-header is-sm-header is-compact">
      <div class="sp-toolbar">
        <div class="sp-actions"><i data-icon="cross" id="spClose" role="button" aria-label="Close" tabindex="0"></i></div>
      </div>
      <div class="sp-heading is-sm">
        <h3 class="sp-title" id="sp-title">Activity</h3>
        <p class="sp-subtitle" id="sp-subtitle"></p>
      </div>
    </div>
    <div class="sp-body" id="sp-body"></div>
    <div class="sp-footer" id="sp-footer"></div>
  </div>
</div>

<!-- ── Dialog overlay (News + Updates) ── -->
<div class="scrim dlg" id="dlgScrim">
  <div class="dialog dialog-m" role="dialog" aria-modal="true" aria-labelledby="dlg-title">
    <button class="dialog-close" aria-label="Close" id="dlgClose"><i data-icon="cross"></i></button>
    <div class="dialog-media" id="dlg-media"><i data-icon="image"></i></div>
    <div class="dialog-header">
      <div class="dialog-header-top"><h3 class="dialog-title" id="dlg-title">Title</h3></div>
      <p class="dialog-subtitle" id="dlg-subtitle"></p>
    </div>
    <div class="dialog-body" id="dlg-body"></div>
    <div class="dialog-footer" id="dlg-footer"></div>
  </div>
</div>

<script src="icons.js"></script>
<script>
(function(){
  // ─────────── Data ───────────
  const ACTIVITIES = [
    {
      id:'pulse', icon:'activity', ico:'teal',
      title:'Pulse survey: Team Spirit Q2',
      desc:'Share how things are going in your team. Takes about 3 minutes.',
      deadline:'Closes in 3 days', urgent:true,
      cta:'Start survey',
      subtitle:'5 questions · ~3 min'
    },
    {
      id:'feedback', icon:'users', ico:'purple',
      title:'Give 360° feedback',
      desc:'2 colleagues have asked you for feedback on their development.',
      deadline:'2 requests pending', urgent:false,
      cta:'Review requests',
      subtitle:'2 colleagues waiting'
    },
    {
      id:'profile', icon:'user-check', ico:'orange',
      title:'Complete your profile',
      desc:'Add your team and role so reports are grouped correctly.',
      progress:60,
      cta:'Finish setup',
      subtitle:'60% complete'
    },
  ];

  const NEWS = [
    {
      id:'award', tag:'Company', tagColor:'green', icon:'win', thumb:'var(--bg-accent-green-base)',
      title:'Effectory wins Best Employer Experience Platform 2026',
      excerpt:'Our team picked up the award at the HR Tech Summit in Amsterdam, recognising the impact of continuous listening.',
      date:'2 days ago',
      body:[
        'At last week’s HR Tech Summit in Amsterdam, Effectory was named Best Employer Experience Platform 2026 — a recognition of the work thousands of organisations do every day to listen to their people.',
        'The jury highlighted our continuous listening approach and the speed at which teams can turn feedback into concrete action. “Effectory makes employee voice impossible to ignore,” the panel noted.',
        'Thank you to every coordinator, manager and employee who makes this possible. This one is for you.'
      ]
    },
    {
      id:'benchmark', tag:'Research', tagColor:'blue', icon:'barchart-2', thumb:'var(--bg-info-base)',
      title:'New benchmark data: tech-sector engagement up 4%',
      excerpt:'The Q2 European benchmark is live. Engagement in the technology sector rose 4 points, driven by stronger team autonomy.',
      date:'5 days ago',
      body:[
        'The Q2 2026 European benchmark is now available in your reports. Across more than 1.2 million responses, engagement in the technology sector rose 4 points compared to last quarter.',
        'The biggest driver was team autonomy, followed by clarity of direction. Organisations that ran a pulse in the last 90 days scored notably higher on both.',
        'Your organisation’s scores are automatically compared against this benchmark in every report.'
      ]
    },
    {
      id:'webinar', tag:'Event', tagColor:'purple', icon:'youtube', thumb:'var(--bg-accent-purple-base)',
      title:'Webinar: turning feedback into action — 18 June',
      excerpt:'Join our 45-minute live session on building action plans that managers actually follow through on.',
      date:'1 week ago',
      body:[
        'On 18 June at 14:00 CET, join our live webinar on closing the feedback loop. We’ll walk through how leading teams turn survey results into action plans that stick.',
        'You’ll learn a simple framework for prioritising themes, assigning owners, and tracking follow-up — plus a live Q&A with our customer success team.',
        'Can’t make it live? Register anyway and we’ll send you the recording.'
      ]
    },
  ];

  const UPDATES = [
    {
      id:'dynamic', icon:'pie-chart', isNew:true,
      title:'Dynamic reporting is here',
      sub:'New look, faster filters, more to explore',
      body:[
        'Reporting just got a major upgrade. The new dynamic reports load faster, remember your filters, and let you drill from organisation-wide down to a single team in one click.',
        'Open any report to try the new experience — your saved views have been migrated automatically.'
      ]
    },
    {
      id:'mentions', icon:'message', isNew:true,
      title:'Comments now support @mentions',
      sub:'Loop colleagues into a report directly',
      body:[
        'You can now @mention colleagues in report comments. They’ll get a notification and a direct link to the exact view you’re discussing.',
        'Start typing @ in any comment to give it a try.'
      ]
    },
    {
      id:'exports', icon:'download', isNew:false,
      title:'Faster survey exports',
      sub:'Large exports now finish up to 5× quicker',
      body:[
        'We’ve rebuilt the export engine. Exports of large surveys now complete up to five times faster, and you’ll get an in-app notification the moment your file is ready.'
      ]
    },
  ];

  const TAG_TEXT = { green:'var(--content-positive-base)', blue:'var(--content-info-base)', purple:'var(--content-accent-purple-base)' };

  // ─────────── Render lists ───────────
  const elAct = document.getElementById('activities');
  elAct.innerHTML = ACTIVITIES.map(a=>`
    <button class="act-card" data-act="${a.id}">
      <div class="act-top">
        <span class="act-ico ${a.ico}"><i data-icon="${a.icon}"></i></span>
      </div>
      <h3>${a.title}</h3>
      <p class="act-desc">${a.desc}</p>
      ${a.progress!=null
        ? `<div class="act-meta" style="flex-direction:column;align-items:stretch;gap:6px;"><div class="progress"><span style="width:${a.progress}%"></span></div><span class="deadline">${a.progress}% complete</span></div>`
        : `<div class="act-meta"><span class="deadline ${a.urgent?'urgent':''}"><i data-icon="${a.urgent?'alert-circle':'clock'}"></i> ${a.deadline}</span></div>`}
    </button>`).join('');

  const elNews = document.getElementById('news');
  elNews.innerHTML = NEWS.map(n=>`
    <button class="news-card" data-news="${n.id}">
      <span class="news-thumb" style="background:${n.thumb}"><i data-icon="${n.icon}"></i></span>
      <div class="news-body">
        <span class="news-tag" style="color:${TAG_TEXT[n.tagColor]}">${n.tag}</span>
        <h3>${n.title}</h3>
        <p>${n.excerpt}</p>
        <span class="news-date">${n.date}</span>
      </div>
    </button>`).join('');

  const elUpd = document.getElementById('updates');
  elUpd.innerHTML = UPDATES.map(u=>`
    <button class="upd-item" data-upd="${u.id}">
      <span class="upd-dot"><i data-icon="${u.icon}"></i></span>
      <div class="upd-text">
        <h4>${u.title} ${u.isNew?'<span class="chip chip-info" style="font-size:12px;font-weight:600;border-radius:var(--radius-full);vertical-align:middle;">New</span>':''}</h4>
        <p>${u.sub}</p>
      </div>
    </button>`).join('');

  // ─────────── Overlay helpers ───────────
  const spScrim = document.getElementById('spScrim');
  const dlgScrim = document.getElementById('dlgScrim');
  let lastFocus = null;

  function openScrim(s){ lastFocus = document.activeElement; s.classList.add('is-open'); document.body.style.overflow='hidden'; if (window.Icons&&window.Icons.render) window.Icons.render(s); }
  function closeAll(){ spScrim.classList.remove('is-open'); dlgScrim.classList.remove('is-open'); document.body.style.overflow=''; if (lastFocus&&lastFocus.focus) lastFocus.focus(); }

  // ─────────── Activity → SIDE PANEL ───────────
  function openActivity(a){
    document.getElementById('sp-title').textContent = a.title;
    document.getElementById('sp-subtitle').textContent = a.subtitle;
    const body = document.getElementById('sp-body');
    const footer = document.getElementById('sp-footer');

    if (a.id==='pulse'){
      const qs = [
        'I feel energised by the work my team does.',
        'My team communicates openly about what’s going well and what isn’t.',
        'I have what I need to do my job well this week.'
      ];
      body.innerHTML = `
        <div class="inline-notif is-info" style="margin-bottom:16px;">
          <img class="inline-notif-icon" src="assets/icons/notification-information.svg" alt="" />
          <div class="inline-notif-content"><span class="inline-notif-text">
            <span class="inline-notif-title">Your answers are anonymous</span>
            <span class="inline-notif-msg">Results are only shown when at least 5 people respond.</span>
          </span></div>
        </div>
        ${qs.map((q,i)=>`
          <div class="sp-survey-q">
            <p class="q-text">${i+1}. ${q}</p>
            <div class="scale" data-scale>
              ${[1,2,3,4,5].map(n=>`<button type="button" data-v="${n}">${n}</button>`).join('')}
            </div>
          </div>`).join('')}`;
      footer.innerHTML = `<button class="btn btn-secondary" data-close>Save for later</button><button class="btn btn-primary" data-close>Submit answers</button>`;
      body.querySelectorAll('[data-scale]').forEach(row=>{
        row.addEventListener('click', e=>{
          const b = e.target.closest('button[data-v]'); if(!b) return;
          row.querySelectorAll('button').forEach(x=>x.classList.remove('is-sel'));
          b.classList.add('is-sel');
        });
      });
    } else if (a.id==='feedback'){
      const people = [
        {n:'Sofia Martens', r:'Product Designer', av:'av-turquoise', i:'SM'},
        {n:'Daan Hofman', r:'Engineering Lead', av:'av-orange', i:'DH'},
      ];
      body.innerHTML = `
        <p class="act-desc" style="margin:0 0 16px;">Two colleagues have requested your feedback for their development cycle. It takes about 5 minutes each and stays confidential.</p>
        ${people.map(p=>`
          <div class="sp-survey-q" style="display:flex;align-items:center;gap:12px;">
            <div class="av av-36 ${p.av}">${p.i}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:600;">${p.n}</div>
              <div style="font-size:12px;color:var(--content-subtle);">${p.r}</div>
            </div>
            <button class="btn btn-secondary">Give feedback</button>
          </div>`).join('')}`;
      footer.innerHTML = `<button class="btn btn-secondary" data-close>Close</button><button class="btn btn-primary" data-close>Start with first</button>`;
    } else if (a.id==='profile'){
      body.innerHTML = `
        <div class="sp-progress-bar" style="margin-bottom:20px;">
          <div class="progress"><span style="width:60%"></span></div>
          <span>60% complete</span>
        </div>
        <div class="tf-wrap" style="margin-bottom:16px;">
          <label class="tf-lbl">Your team</label>
          <div class="tf-field"><input class="tf" type="text" placeholder="e.g. Product — Insights" /></div>
        </div>
        <div class="tf-wrap" style="margin-bottom:16px;">
          <label class="tf-lbl">Job title</label>
          <div class="tf-field"><input class="tf" type="text" value="People Analytics Lead" /></div>
        </div>
        <div class="tf-wrap">
          <label class="tf-lbl">Location</label>
          <div class="tf-field"><input class="tf" type="text" placeholder="e.g. Amsterdam" /></div>
        </div>`;
      footer.innerHTML = `<button class="btn btn-secondary" data-close>Cancel</button><button class="btn btn-primary" data-close>Save profile</button>`;
    }

    footer.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', closeAll));
    openScrim(spScrim);
  }

  // ─────────── News / Update → DIALOG ───────────
  function openNews(n){
    const media = document.getElementById('dlg-media');
    media.style.background = n.thumb;
    media.style.color = '#fff';
    media.innerHTML = `<i data-icon="${n.icon}" style="width:48px;height:48px;display:flex;"></i>`;
    document.getElementById('dlg-title').textContent = n.title;
    document.getElementById('dlg-subtitle').textContent = '';
    document.getElementById('dlg-body').innerHTML =
      `<div class="dlg-news-meta"><span class="news-tag" style="color:${TAG_TEXT[n.tagColor]}">${n.tag}</span> · <span>${n.date}</span></div>`
      + n.body.map(p=>`<p>${p}</p>`).join('');
    document.getElementById('dlg-footer').innerHTML =
      `<a class="dialog-footer-link" href="#" data-close>Open in newsroom <i data-icon="external-link"></i></a>
       <button class="btn btn-primary" data-close>Got it</button>`;
    wireDialogClose();
    openScrim(dlgScrim);
  }

  function openUpdate(u){
    const media = document.getElementById('dlg-media');
    media.style.background = 'var(--bg-brand-subtle)';
    media.style.color = 'var(--content-brand-base)';
    media.innerHTML = `<i data-icon="${u.icon}" style="width:48px;height:48px;display:flex;"></i>`;
    document.getElementById('dlg-title').textContent = u.title;
    document.getElementById('dlg-subtitle').textContent = u.sub;
    document.getElementById('dlg-body').innerHTML = u.body.map(p=>`<p>${p}</p>`).join('');
    document.getElementById('dlg-footer').innerHTML =
      `<button class="btn btn-secondary" data-close>Maybe later</button>
       <button class="btn btn-primary" data-close>Try it now</button>`;
    wireDialogClose();
    openScrim(dlgScrim);
  }

  function wireDialogClose(){
    document.getElementById('dlg-footer').querySelectorAll('[data-close]').forEach(b=>{
      b.addEventListener('click', e=>{ e.preventDefault(); closeAll(); });
    });
  }

  // ─────────── Click wiring ───────────
  elAct.addEventListener('click', e=>{ const c=e.target.closest('[data-act]'); if(c) openActivity(ACTIVITIES.find(a=>a.id===c.dataset.act)); });
  elNews.addEventListener('click', e=>{ const c=e.target.closest('[data-news]'); if(c) openNews(NEWS.find(n=>n.id===c.dataset.news)); });
  elUpd.addEventListener('click', e=>{ const c=e.target.closest('[data-upd]'); if(c) openUpdate(UPDATES.find(u=>u.id===c.dataset.upd)); });

  document.getElementById('spClose').addEventListener('click', closeAll);
  document.getElementById('spClose').addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') closeAll(); });
  document.getElementById('dlgClose').addEventListener('click', closeAll);
  [spScrim,dlgScrim].forEach(s=>s.addEventListener('click', e=>{ if(e.target===s) closeAll(); }));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAll(); });

  if (window.Icons && window.Icons.render) window.Icons.render(document);
})();
</script>
</body>
</html>
