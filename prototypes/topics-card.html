<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feel-good topics — card</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Card ── */
    .tp-card {
      box-sizing: border-box;
      width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-base);
    }

    /* ── Header ── */
    .tp-header {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-extra-tight);
    }
    .tp-title-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-base-tight);
    }
    .tp-title {
      flex: 1;
      margin: 0;
    }
    .tp-desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--content-secondary);
    }
    .tp-icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-extra-tight);
    }
    .tp-icons .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .tp-icons .tt-demo:hover .tooltip,
    .tp-icons .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ── Topic-tiles ── */
    .tp-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-base-tight);
      min-height: 0;
    }
    .tp-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      padding: var(--spacing-base) var(--spacing-super-loose) var(--spacing-base) var(--spacing-base);
      background: var(--bg-secondary);
      border-radius: var(--radius-base);
      overflow: hidden;
      cursor: pointer;
      border: 0;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .tp-tile-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border: 2px solid var(--border-white);
      border-radius: var(--radius-base);
    }
    .tp-tile.is-green .tp-tile-fill { background: var(--bg-accent-green-subtle); }
    .tp-tile.is-turquoise .tp-tile-fill { background: var(--bg-accent-turquoise-subtle); }
    .tp-tile.is-blue .tp-tile-fill { background: var(--bg-accent-blue-subtle); }
    .tp-tile-name {
      position: relative;
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
      color: var(--content-base);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tp-tile-meta {
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--content-base);
    }
    .tp-tile-meta i {
      display: flex;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .tp-tile-chevron {
      position: absolute;
      right: var(--spacing-base-tight);
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      width: 16px;
      height: 16px;
      color: var(--content-base);
    }

    /* ── Footer-link ── */
    .tp-footer {
      margin-top: auto;
    }
    .tp-footer .btn-link i {
      display: flex;
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>

  <div class="tp-card">
    <div class="tp-header">
      <div class="tp-title-row">
        <p class="tp-title text-l5">Feel-good topics</p>
        <div class="tp-icons">
          <div class="tt-demo">
            <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
            <div class="tooltip is-above">Pin card</div>
          </div>
          <div class="tt-demo">
            <button class="ib ib-36 ib-tertiary" aria-label="Card settings"><i data-icon="gear"></i></button>
            <div class="tooltip is-above">Card settings</div>
          </div>
          <div class="tt-demo">
            <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
            <div class="tooltip is-above">More information</div>
          </div>
        </div>
      </div>
      <p class="tp-desc">What topic are you most proud of within Effectory?</p>
    </div>

    <div class="tp-list" id="tp-list"></div>

    <div class="tp-footer">
      <button class="btn btn-link">View Topics &amp; Ideas <i data-icon="chevron-right"></i></button>
    </div>
  </div>

  <script src="/icons.js"></script>
  <script>
    // Topic-tiles: vulling = aandeel keren gekozen (t.o.v. de populairste topic)
    const TOPICS = [
      { name: 'Collaboration between teams',             count: 540, color: 'is-green' },
      { name: 'Our feedback culture very long example',  count: 384, color: 'is-turquoise' },
      { name: 'Our feedback culture',                    count: 146, color: 'is-blue' }
    ];

    const max = Math.max(...TOPICS.map(t => t.count));
    const list = document.getElementById('tp-list');
    for (const t of TOPICS) {
      const pct = Math.round((t.count / max) * 90);
      const el = document.createElement('button');
      el.className = `tp-tile ${t.color}`;
      el.innerHTML = `
        <span class="tp-tile-fill" style="width:${pct}%"></span>
        <p class="tp-tile-name">${t.name}</p>
        <span class="tp-tile-meta"><i data-icon="users"></i>${t.count} times selected</span>
        <span class="tp-tile-chevron"><i data-icon="chevron-right"></i></span>`;
      list.appendChild(el);
    }
    Icons.render(list);
  </script>
</body>
</html>
