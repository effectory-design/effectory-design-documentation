<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Response rate — card</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Card ── */
    .rr-card {
      box-sizing: border-box;
      width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-base);
    }

    /* ── Header ── */
    .rr-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-base-tight);
    }
    .rr-title {
      flex: 1;
      margin: 0;
    }
    .rr-icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-extra-tight);
    }
    /* tooltips: verborgen tot hover/focus */
    .rr-icons .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .rr-icons .tt-demo:hover .tooltip,
    .rr-icons .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ── Gauge container ── */
    .rr-body {
      position: relative;
      flex: 1;
      min-height: 0;
      border: 1px solid var(--border-base);
      border-radius: var(--radius-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-base);
      padding: var(--spacing-extra-loose) var(--spacing-loose) var(--spacing-super-loose);
    }
    .rr-gauge {
      position: relative;
      width: 136px;
      height: 136px;
    }
    .rr-gauge canvas {
      position: absolute;
      inset: 0;
    }
    .rr-gauge-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--content-base);
      pointer-events: none;
    }
    .rr-participants {
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      color: var(--content-info-secondary);
    }
    .rr-participants b {
      font-weight: 600;
      color: var(--content-info-base);
    }

    /* ── Trend badge ── */
    .rr-trend {
      position: absolute;
      right: var(--spacing-base);
      bottom: var(--spacing-base-tight);
      display: flex;
      align-items: center;
      gap: var(--spacing-extra-tight);
      padding: 2px var(--spacing-extra-tight);
      background: var(--bg-base);
      border: 1px solid var(--border-negative-base);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      color: var(--content-negative-base);
    }
    .rr-trend i {
      display: flex;
      width: 16px;
      height: 16px;
    }

    /* ── Benchmark bar ── */
    .rr-bench {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-tight);
    }
    .rr-bench-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      color: var(--content-base);
    }
    .rr-bench-track {
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .rr-bench-fill {
      height: 100%;
      background: var(--bg-results-benchmark);
      border-radius: var(--radius-full);
    }
  </style>
</head>
<body>

  <div class="rr-card">
    <div class="rr-header">
      <p class="rr-title text-l5">Response rate</p>
      <div class="rr-icons">
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
          <div class="tooltip is-above">Pin card</div>
        </div>
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
          <div class="tooltip is-above">More information</div>
        </div>
      </div>
    </div>

    <div class="rr-body">
      <div class="rr-gauge">
        <canvas id="rr-chart" width="136" height="136" role="img" aria-label="Response rate 67%"></canvas>
        <div class="rr-gauge-value">67%</div>
      </div>
      <div class="rr-participants"><b>737</b>/1100 Participants</div>
      <div class="rr-trend">
        12%
        <i data-icon="Trend-down"></i>
      </div>
    </div>

    <div class="rr-bench">
      <div class="rr-bench-row">
        <span>Benchmark</span>
        <span>84%</span>
      </div>
      <div class="rr-bench-track">
        <div class="rr-bench-fill" style="width:84%"></div>
      </div>
    </div>
  </div>

  <script src="/icons.js"></script>
  <script>
    const css = (name) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    const VALUE = 67; // response rate %

    // Eindpunt van de boog krijgt een dot-marker, zoals in het Figma-design
    const endDot = {
      id: 'endDot',
      afterDatasetsDraw(chart) {
        const arc = chart.getDatasetMeta(0).data[0];
        if (!arc) return;
        const { ctx } = chart;
        const r = (arc.outerRadius + arc.innerRadius) / 2;
        const x = arc.x + Math.cos(arc.endAngle) * r;
        const y = arc.y + Math.sin(arc.endAngle) * r;
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = css('--bg-info-base');
        ctx.strokeStyle = css('--bg-base');
        ctx.lineWidth = 2.5;
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    };

    new Chart(document.getElementById('rr-chart'), {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [VALUE, 100 - VALUE],
          backgroundColor: [css('--bg-info-base'), css('--bg-tertiary')],
          borderWidth: 0,
          borderRadius: 999
        }]
      },
      options: {
        // open gauge: ~35° opening gecentreerd onderaan (caps op ~197° en ~163°),
        // conform de Figma graph/progress geometrie
        rotation: 197.5,
        circumference: 325,
        cutout: '82%',
        responsive: false,
        events: [],
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: { legend: { display: false }, tooltip: { enabled: false } }
      },
      plugins: [endDot]
    });
  </script>
</body>
</html>
