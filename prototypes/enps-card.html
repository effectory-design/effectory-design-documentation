<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Net Promoter Score — card</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Card ── */
    .nps-card {
      box-sizing: border-box;
      width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-base);
    }

    /* ── Header ── */
    .nps-header {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-extra-tight);
    }
    .nps-title-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-base-tight);
    }
    .nps-title {
      flex: 1;
      margin: 0;
    }
    .nps-desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--content-secondary);
    }
    .nps-icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-extra-tight);
    }
    /* tooltips: verborgen tot hover/focus */
    .nps-icons .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .nps-icons .tt-demo:hover .tooltip,
    .nps-icons .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ── Donut ── */
    .nps-graph {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nps-donut {
      position: relative;
      width: 128px;
      height: 128px;
    }
    .nps-donut canvas {
      position: absolute;
      inset: 0;
    }
    .nps-donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }
    .nps-donut-value {
      font-size: 32px;
      font-weight: 600;
      line-height: 40px;
      letter-spacing: -0.02em;
      color: var(--content-base);
    }
    .nps-donut-label {
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      color: var(--content-secondary);
    }

    /* ── Categorie-rijen ── */
    .nps-rows {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-tight);
    }
    .nps-row {
      box-sizing: border-box;
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
      height: 48px;
      padding: 0 var(--spacing-base-tight);
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      color: var(--content-base);
    }
    .nps-row-cat {
      flex: 1;
      display: flex;
      align-items: center;
      gap: var(--spacing-tight);
      min-width: 0;
    }
    .nps-row-cat i {
      display: flex;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    .nps-row.is-promoters .nps-row-cat i { color: var(--bg-distribution-agree); }
    .nps-row.is-passives .nps-row-cat i { color: var(--bg-distribution-neither-agree-disagree); }
    .nps-row.is-detractors .nps-row-cat i { color: var(--bg-distribution-disagree); }
    .nps-row-pct {
      width: 40px;
      text-align: right;
    }
    .nps-row-count {
      display: flex;
      align-items: center;
      gap: var(--spacing-tight);
      color: var(--content-secondary);
    }
    .nps-row-count span {
      width: 48px;
      text-align: right;
    }
    .nps-row-count i {
      display: flex;
      width: 16px;
      height: 16px;
      color: var(--content-base);
    }
  </style>
</head>
<body>

  <div class="nps-card">
    <div class="nps-header">
      <div class="nps-title-row">
        <p class="nps-title text-l5">Employee Net Promoter Score</p>
        <div class="nps-icons">
          <div class="tt-demo">
            <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
            <div class="tooltip is-above">Pin card</div>
          </div>
          <div class="tt-demo">
            <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
            <div class="tooltip is-above">More information</div>
          </div>
        </div>
      </div>
      <p class="nps-desc">Shows to what extent employees would recommend your organization</p>
    </div>

    <div class="nps-graph">
      <div class="nps-donut">
        <canvas id="nps-chart" width="128" height="128" role="img"
                aria-label="eNPS 15: 35% promoters, 45% passives, 20% detractors"></canvas>
        <div class="nps-donut-center">
          <span class="nps-donut-value" id="nps-value">15</span>
          <span class="nps-donut-label">eNPS</span>
        </div>
      </div>
    </div>

    <div class="nps-rows">
      <div class="nps-row is-promoters">
        <div class="nps-row-cat">
          <i data-icon="net-promoter-score"></i>
          Promoters
        </div>
        <div class="nps-row-pct">35%</div>
        <div class="nps-row-count"><span>258</span><i data-icon="users"></i></div>
      </div>
      <div class="nps-row is-passives">
        <div class="nps-row-cat">
          <i data-icon="net-promoter-score-passive"></i>
          Passives
        </div>
        <div class="nps-row-pct">45%</div>
        <div class="nps-row-count"><span>332</span><i data-icon="users"></i></div>
      </div>
      <div class="nps-row is-detractors">
        <div class="nps-row-cat">
          <i data-icon="net-promoter-score-detractor"></i>
          Detractors
        </div>
        <div class="nps-row-pct">20%</div>
        <div class="nps-row-count"><span>147</span><i data-icon="users"></i></div>
      </div>
    </div>
  </div>

  <script src="/icons.js"></script>
  <script>
    const css = (name) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    const PROMOTERS = 35, PASSIVES = 45, DETRACTORS = 20;
    document.getElementById('nps-value').textContent = PROMOTERS - DETRACTORS;

    new Chart(document.getElementById('nps-chart'), {
      type: 'doughnut',
      data: {
        labels: ['Promoters', 'Passives', 'Detractors'],
        datasets: [{
          data: [PROMOTERS, PASSIVES, DETRACTORS],
          backgroundColor: [
            css('--bg-distribution-agree'),
            css('--bg-distribution-neither-agree-disagree'),
            css('--bg-distribution-disagree')
          ],
          borderWidth: 0
        }]
      },
      options: {
        // segmenten starten bovenaan en lopen met de klok mee, zonder tussenruimte
        rotation: 0,
        cutout: '82%',
        responsive: false,
        events: [],
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: { legend: { display: false }, tooltip: { enabled: false } }
      }
    });
  </script>
</body>
</html>
