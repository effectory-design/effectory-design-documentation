<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workload, Retention &amp; Well-being — cards</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Stapel van drie mini-cards ── */
    .kpi-stack {
      width: 384px;
      height: 456px;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-tight);
    }
    .kpi-card {
      box-sizing: border-box;
      flex: 1;
      min-height: 0;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
    }

    /* ── Tekstkolom ── */
    .kpi-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-extra-tight);
    }
    .kpi-title-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-tight);
    }
    .kpi-title {
      margin: 0;
    }
    .kpi-icons {
      display: flex;
      align-items: center;
    }
    .kpi-icons .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .kpi-icons .tt-demo:hover .tooltip,
    .kpi-icons .tt-demo:focus-within .tooltip {
      opacity: 1;
    }
    .kpi-desc {
      margin: 0;
      font-size: 14px;
      line-height: 20px;
      color: var(--content-secondary);
    }

    /* ── Mini-gauge ── */
    .kpi-gauge {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }
    .kpi-gauge canvas {
      position: absolute;
      inset: 0;
    }
    .kpi-gauge-value {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      line-height: 27px;
      color: var(--content-base);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="kpi-stack">

    <div class="kpi-card">
      <div class="kpi-text">
        <div class="kpi-title-row">
          <p class="kpi-title text-l5">Workload</p>
          <div class="kpi-icons">
            <div class="tt-demo">
              <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
              <div class="tooltip is-above">Pin card</div>
            </div>
            <div class="tt-demo">
              <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
              <div class="tooltip is-above">More information</div>
            </div>
          </div>
        </div>
        <p class="kpi-desc">Employees who find their workload just right.</p>
      </div>
      <div class="kpi-gauge">
        <canvas id="kpi-workload" width="72" height="72" role="img" aria-label="Workload 82%"></canvas>
        <div class="kpi-gauge-value">82%</div>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-text">
        <div class="kpi-title-row">
          <p class="kpi-title text-l5">Retention</p>
          <div class="kpi-icons">
            <div class="tt-demo">
              <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
              <div class="tooltip is-above">Pin card</div>
            </div>
            <div class="tt-demo">
              <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
              <div class="tooltip is-above">More information</div>
            </div>
          </div>
        </div>
        <p class="kpi-desc">Employees who want to stay at their current role.</p>
      </div>
      <div class="kpi-gauge">
        <canvas id="kpi-retention" width="72" height="72" role="img" aria-label="Retention 67%"></canvas>
        <div class="kpi-gauge-value">67%</div>
      </div>
    </div>

    <div class="kpi-card">
      <div class="kpi-text">
        <div class="kpi-title-row">
          <p class="kpi-title text-l5">Well-being</p>
          <div class="kpi-icons">
            <div class="tt-demo">
              <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
              <div class="tooltip is-above">Pin card</div>
            </div>
            <div class="tt-demo">
              <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
              <div class="tooltip is-above">More information</div>
            </div>
          </div>
        </div>
        <p class="kpi-desc">How well employees can maintain a good work-life balance.</p>
      </div>
      <div class="kpi-gauge">
        <canvas id="kpi-wellbeing" width="72" height="72" role="img" aria-label="Well-being 7.5 out of 10"></canvas>
        <div class="kpi-gauge-value">7.5</div>
      </div>
    </div>

  </div>

  <script src="/icons.js"></script>
  <script>
    const css = (name) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim();

    // Dot-marker op het einde van de boog, zoals in het Figma-design
    const endDot = (colorVar) => ({
      id: 'endDot',
      afterDatasetsDraw(chart) {
        const arc = chart.getDatasetMeta(0).data[0];
        if (!arc) return;
        const { ctx } = chart;
        const r = (arc.outerRadius + arc.innerRadius) / 2;
        const x = arc.x + Math.cos(arc.endAngle) * r;
        const y = arc.y + Math.sin(arc.endAngle) * r;
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, 4.5, 0, Math.PI * 2);
        ctx.fillStyle = css(colorVar);
        ctx.strokeStyle = css('--bg-base');
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
    });

    // Open mini-gauge: zelfde geometrie als de Response rate-kaart (opening ~35° onderaan)
    function gauge(id, pct, colorVar) {
      new Chart(document.getElementById(id), {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [pct, 100 - pct],
            backgroundColor: [css(colorVar), css('--bg-tertiary')],
            borderWidth: 0,
            borderRadius: 999
          }]
        },
        options: {
          rotation: 197.5,
          circumference: 325,
          cutout: '80%',
          responsive: false,
          events: [],
          animation: { duration: 800, easing: 'easeOutQuart' },
          plugins: { legend: { display: false }, tooltip: { enabled: false } }
        },
        plugins: [endDot(colorVar)]
      });
    }

    gauge('kpi-workload', 82, '--bg-positive-base');
    gauge('kpi-retention', 67, '--bg-positive-base');
    gauge('kpi-wellbeing', 75, '--bg-info-base'); // 7.5 op schaal 0–10
  </script>
</body>
</html>
