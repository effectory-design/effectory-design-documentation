<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lowest scores — card</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Card ── */
    .qs-card {
      box-sizing: border-box;
      width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-base);
    }

    /* ── Header ── */
    .qs-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-base);
    }
    .qs-illu {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .qs-title {
      flex: 1;
      margin: 0;
    }
    .qs-icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-extra-tight);
    }
    .qs-icons .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .qs-icons .tt-demo:hover .tooltip,
    .qs-icons .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ── Vraag-rijen ── */
    .qs-rows {
      display: flex;
      flex-direction: column;
    }
    .qs-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-tight);
      padding: var(--spacing-base) 0;
      border-top: 1px solid var(--border-base);
    }
    .qs-row-q {
      flex: 1;
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--content-secondary);
    }
    .qs-row-score {
      width: 48px;
      height: 24px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: var(--bg-warning-subtle);
      color: var(--content-warning-secondary);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="qs-card">
    <div class="qs-header">
      <img class="qs-illu" src="/assets/illustrations/improve-small.svg" alt="" />
      <p class="qs-title text-l5">Lowest scores</p>
      <div class="qs-icons">
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
          <div class="tooltip is-above">Pin card</div>
        </div>
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
          <div class="tooltip is-above">More information</div>
        </div>
      </div>
    </div>

    <div class="qs-rows" id="qs-rows"></div>
  </div>

  <script src="/icons.js"></script>
  <script>
    const SCORES = [
      { question: 'I know how to carry out my tasks', score: 43 },
      { question: 'I receive enough feedback on my work', score: 51 },
      { question: 'I am satisfied with my work', score: 52 },
      { question: 'We honour agreements in our team', score: 54 },
      { question: 'I see ample opportunities to develop further', score: 60 }
    ];

    document.getElementById('qs-rows').innerHTML = SCORES.map(s => `
      <div class="qs-row">
        <p class="qs-row-q">${s.question}</p>
        <span class="qs-row-score">${s.score}%</span>
      </div>`).join('');
  </script>
</body>
</html>
