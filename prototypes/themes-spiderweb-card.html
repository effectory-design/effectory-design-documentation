<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Themes — card</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Card ── */
    .sw-card {
      box-sizing: border-box;
      width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: var(--spacing-base);
    }

    /* ── Header ── */
    .sw-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-base-tight);
      width: 100%;
    }
    .sw-title {
      flex: 1;
      margin: 0;
    }
    .sw-icons {
      display: flex;
      align-items: center;
      gap: var(--spacing-extra-tight);
    }
    .sw-icons .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .sw-icons .tt-demo:hover .tooltip,
    .sw-icons .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ── Radar ── */
    .sw-graph {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    /* ── Legend ── */
    .sw-legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-loose);
    }
    .sw-legend-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-tight);
      font-size: 12px;
      font-weight: 500;
      line-height: 16px;
      color: var(--content-base);
    }
    .sw-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
    }
    .sw-legend-dot.is-current { background: var(--bg-results-current); }
    .sw-legend-dot.is-previous { background: var(--bg-results-previous); }
  </style>
</head>
<body>

  <div class="sw-card">
    <div class="sw-header">
      <p class="sw-title text-l5">Themes</p>
      <div class="sw-icons">
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="Pin card"><i data-icon="pin"></i></button>
          <div class="tooltip is-above">Pin card</div>
        </div>
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="Card settings"><i data-icon="gear"></i></button>
          <div class="tooltip is-above">Card settings</div>
        </div>
        <div class="tt-demo">
          <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
          <div class="tooltip is-above">More information</div>
        </div>
      </div>
    </div>

    <div class="sw-graph">
      <canvas id="sw-chart" width="334" height="290" role="img"
              aria-label="Spiderweb of theme scores, current versus previous survey"></canvas>
    </div>

    <div class="sw-legend">
      <div class="sw-legend-item"><span class="sw-legend-dot is-current"></span>Current</div>
      <div class="sw-legend-item"><span class="sw-legend-dot is-previous"></span>Previous</div>
    </div>
  </div>

  <script src="/icons.js"></script>
  <script>
    const css = (name) =>
      getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    const rgba = (hex, a) => {
      const [r, g, b] = [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16));
      return `rgba(${r},${g},${b},${a})`;
    };

    const THEMES = ['Engagement', 'Diversity', 'Employer-ship', 'Customer focus', 'Alignment', 'Leadership'];
    const CURRENT = [43, 61, 56, 87, 62, 78];
    const PREVIOUS = [13, 50, 77, 60, 62, 62];

    const cur = css('--bg-results-current');
    const prev = css('--bg-results-previous');

    // Pas initialiseren als Poppins geladen is — anders worden labels afgeknipt
    document.fonts.ready.then(() => {
    new Chart(document.getElementById('sw-chart'), {
      type: 'radar',
      data: {
        labels: THEMES,
        datasets: [
          {
            label: 'Previous',
            data: PREVIOUS,
            backgroundColor: rgba(prev, 0.54),
            borderColor: prev,
            borderWidth: 1,
            pointBackgroundColor: css('--bg-base'),
            pointBorderColor: css('--border-highlight-base'),
            pointBorderWidth: 2,
            pointRadius: 5
          },
          {
            label: 'Current',
            data: CURRENT,
            backgroundColor: rgba(cur, 0.47),
            borderColor: cur,
            borderWidth: 1,
            pointBackgroundColor: css('--bg-base'),
            pointBorderColor: css('--border-info-base'),
            pointBorderWidth: 2,
            pointRadius: 5
          }
        ]
      },
      options: {
        responsive: false,
        events: [],
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          r: {
            min: 0,
            max: 100,
            ticks: { display: false, stepSize: 25 },
            grid: { color: css('--border-base') },
            angleLines: { color: css('--border-base') },
            pointLabels: {
              color: css('--content-base'),
              font: { family: 'Poppins', size: 12, weight: 500 }
            }
          }
        }
      }
    });
    });
  </script>
</body>
</html>
