<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Effectiveness — card</title>
  <base href="/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/foundation.css" />
  <link rel="stylesheet" href="/components.css" />
  <style>
    body {
      background: var(--bg-interface-body);
      color: var(--content-base);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-extra-loose);
    }

    /* ── Card ── */
    .fx-card {
      box-sizing: border-box;
      width: 384px;
      height: 456px;
      background: var(--bg-base);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      box-shadow: var(--sh-card);
      padding: var(--spacing-loose);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-extra-tight);
    }

    /* ── Header ── */
    .fx-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-base-tight);
    }
    .fx-title {
      flex: 1;
      margin: 0;
    }
    .fx-header .tooltip {
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--motion-fast) var(--ease-out);
    }
    .fx-header .tt-demo:hover .tooltip,
    .fx-header .tt-demo:focus-within .tooltip {
      opacity: 1;
    }

    /* ── Assen ── */
    .fx-axis {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--content-secondary);
    }
    .fx-axis.is-x {
      text-align: right;
    }

    /* ── Matrix ── */
    .fx-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-tight);
      min-height: 0;
    }
    .fx-matrix {
      position: relative;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: var(--spacing-extra-tight);
    }
    .fx-quad {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-base);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.6;
      text-align: center;
    }
    .fx-quad.is-detached {
      background: var(--bg-tertiary);
      color: var(--content-secondary);
      border-top-left-radius: var(--radius-lg);
    }
    .fx-quad.is-effective {
      background: var(--bg-accent-green-subtle);
      color: var(--content-accent-green-base);
      border-top-right-radius: var(--radius-lg);
    }
    .fx-quad.is-ineffective {
      background: var(--bg-accent-red-subtle);
      color: var(--content-accent-red-base);
      border-bottom-left-radius: var(--radius-lg);
    }
    .fx-quad.is-not-utilized {
      background: var(--bg-accent-yellow-subtle);
      color: var(--content-accent-yellow-base);
      border-bottom-right-radius: var(--radius-lg);
    }

    /* schaal-labels in de hoeken */
    .fx-scale {
      position: absolute;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--content-secondary);
      padding: var(--spacing-extra-tight) var(--spacing-tight);
    }
    .fx-scale.is-top-left { top: 0; left: 0; }
    .fx-scale.is-bottom-left { bottom: 0; left: 0; }
    .fx-scale.is-bottom-right { bottom: 0; right: 0; }

    /* ── Markers (dot + chip) ── */
    .fx-marker {
      position: absolute;
      width: 12px;
      height: 12px;
      transform: translate(-50%, -50%);
    }
    .fx-dot {
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      border: 2px solid var(--border-white);
      box-sizing: border-box;
    }
    .fx-chip {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: var(--spacing-extra-tight) var(--spacing-tight);
      border-radius: var(--radius-base);
      border: 2px solid var(--border-white);
      box-shadow: var(--sh-card);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.6;
      white-space: nowrap;
    }
    .fx-marker.is-chip-above .fx-chip { bottom: calc(100% + var(--spacing-tight)); }
    .fx-marker.is-chip-below .fx-chip { top: calc(100% + var(--spacing-tight)); }
    .fx-chip i {
      display: flex;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    /* marker-varianten */
    .fx-marker.is-org .fx-dot { background: var(--content-secondary); }
    .fx-marker.is-org .fx-chip {
      background: var(--bg-tertiary);
      color: var(--content-base);
    }
    .fx-marker.is-current .fx-dot { background: var(--content-info-secondary); }
    .fx-marker.is-current .fx-chip {
      background: var(--bg-info-base);
      color: var(--content-inverse-base);
    }
    .fx-marker.is-previous .fx-dot { background: var(--content-info-base); }
    .fx-marker.is-previous .fx-chip {
      background: var(--bg-accent-blue-subtle);
      color: var(--content-info-base);
    }
  </style>
</head>
<body>

  <div class="fx-card">
    <div class="fx-header">
      <p class="fx-title text-l5">Effectiveness</p>
      <div class="tt-demo">
        <button class="ib ib-36 ib-tertiary" aria-label="More information"><i data-icon="info"></i></button>
        <div class="tooltip is-above">More information</div>
      </div>
    </div>

    <div class="fx-body">
      <p class="fx-axis">Performance environment</p>

      <div class="fx-matrix" id="fx-matrix">
        <div class="fx-quad is-detached">Detached</div>
        <div class="fx-quad is-effective">Effective</div>
        <div class="fx-quad is-ineffective">Ineffective</div>
        <div class="fx-quad is-not-utilized">Not fully utilized</div>

        <span class="fx-scale is-top-left">100%</span>
        <span class="fx-scale is-bottom-left">0%</span>
        <span class="fx-scale is-bottom-right">100%</span>
      </div>

      <p class="fx-axis is-x">Engagement</p>
    </div>
  </div>

  <script src="/icons.js"></script>
  <script>
    // Datapunten: x = Engagement (0–100), y = Performance environment (0–100)
    const MARKERS = [
      { variant: 'is-org',      chip: 'is-chip-above', icon: 'building',        label: 'Effectory',       x: 75, y: 76 },
      { variant: 'is-current',  chip: 'is-chip-above', icon: 'group',           label: 'Marketing',       x: 73, y: 55 },
      { variant: 'is-previous', chip: 'is-chip-below', icon: 'rotate-backward', label: 'previous survey', x: 51, y: 32 }
    ];

    const matrix = document.getElementById('fx-matrix');
    for (const m of MARKERS) {
      const el = document.createElement('div');
      el.className = `fx-marker ${m.variant} ${m.chip}`;
      el.style.left = m.x + '%';
      el.style.top = (100 - m.y) + '%';
      el.innerHTML = `<div class="fx-dot"></div><div class="fx-chip"><i data-icon="${m.icon}"></i>${m.label}</div>`;
      matrix.appendChild(el);
    }
    Icons.render(matrix);
  </script>
</body>
</html>
